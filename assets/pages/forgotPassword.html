<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIS</title>
    <link rel="stylesheet" href="../css/style2.css">
    <link rel="shortcut icon" href="../img/logo.png" type="image/x-icon">
    <link rel="preconnect" href="../font/Poppins/Poppins-Black.ttf">
</head>
<body>
        <section class="firstSection">
            <div class="heroForm">
                <form action="" class="formSign">
                    <div class="formTitle">
                        <h2>Forgot Password?</h2>
                        <h3>Enter your email and get a reset link</h3>
                    </div>
                    
                     <div class="inputBox">
                        <label for="email">Email address</label>
                        <input type="email" id="email" class="email" placeholder="Enter your email">
                    </div>
                    
                    <button type="button" class="signUpButton">Send reset link</button>

                    <div class="notice">
                        <p>If account exists a link will be sent</p>
                    </div>
                    <div class="orDivision">
                        <div class="division"></div>
                        <p>or</p>
                        <div class="division"></div>
                    </div>

                    <div class="loginLink">
                        <h3>Go Back to <a href="./login.html"> Login in Page</a></h3>
                    </div>
                </form>
            </div>
            <div class="backgroundImage">
            </div>
        </section>

    <script src="../js/main.js"></script>
</body>
</html>
