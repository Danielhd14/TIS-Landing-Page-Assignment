<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIS</title>
    <link rel="stylesheet" href="../css/style2.css">
    <link rel="shortcut icon" href="../img/logo.png" type="image/x-icon">
    <link rel="preconnect" href="../font/Poppins/Poppins-Black.ttf">
</head>
<body>
        <section class="firstSection">
            <div class="heroForm">
                <form action="" class="formSign">
                    <div class="formTitle">
                        <h2>Welcome back!</h2>
                        <h3>Enter your Credentials to access your account</h3>
                    </div>
                    
                     <div class="inputBox">
                        <label for="email">Email address</label>
                        <input type="email" id="email" class="email" placeholder="Enter your email">
                    </div>
                     <div class="inputBox">
                        <div class="passwordLabel">
                            <label for="password">Password</label>
                            <a href="./forgotPassword.html">Forgot Password?</a>
                        </div>
                        
                        <input type="password" id="password" class="password" placeholder="Enter your password">
                    </div>
                    <div class="agreementBox">
                        <input type="checkbox" name="agree" id="agree">
                        <label for="agree">Remeber for 30 days</u></label>
                    </div>
                    <button type="button" class="signUpButton">Login</button>

                    <div class="orDivision">
                        <div class="division"></div>
                        <p>or</p>
                        <div class="division"></div>
                    </div>

                    <div class="signInAlt">
                        <div class="signInWith">
                            <img src="../img/googleIcon.png" alt="Google Icon">
                            <p>Sign in with Google</p>
                        </div>
                        <div class="signInWith">
                            <img src="../img/appleIcon.png" alt="Google Icon">
                            <p>Sign in with Google</p>
                        </div>
                    </div>
                    <div class="loginLink">
                        <h3>Have an account? <a href="./signIn.html"> Sign Up</a></h3>
                        <h4>Back to Home <a href="../../index.html"><u>Go Home</u> </a></h4>
                    </div>
                </form>
            </div>
            <div class="backgroundImage">
            </div>
        </section>

    <script src="../js/main.js"></script>
</body>
</html>
